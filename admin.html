<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Super Usuário</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: aquamarine;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    .esqueci-senha {
      text-align: right;
      font-size: 12px;
      margin-top: 8px;
    }
    .esqueci-senha a {
      color: #4CAF50;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login Super Usuário</h2>
    <form>
      <label>Usuário:</label>
      <input type="text" name="usuario">
      <label>Senha:</label>
      <input type="password" name="senha">
      <button type="submit">Entrar</button>
    </form>
    <div class="esqueci-senha">
      <a href="#">Esqueci a senha</a>
    </div>
  </div>
</body>
</html>
