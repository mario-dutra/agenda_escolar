<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
    <title>Agendamento de Provas - Instituto Marito Dutra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #1A4D2E;
        }

        .header {
            background: #B8E6D1;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo img {
            height: 50px;
        }

        .header-title {
            text-align: center;
            flex: 1;
        }

        .header-title h1 {
            font-family: 'Brush Script MT', cursive;
            font-size: clamp(18px, 4vw, 28px);
            color: #1A4D2E;
            font-weight: 400;
        }

        .header-title p {
            font-size: 14px;
            color: #1A4D2E;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-sair {
            background: white;
            border: 1px solid #1A4D2E;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #1A4D2E;
        }

        .sub-header {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #B8E6D1;
        }

        .sub-header h2 {
            font-size: 20px;
            color: #1A4D2E;
        }

        .btn-voltar {
            background: #B8E6D1;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #1A4D2E;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .form-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #1A4D2E;
        }

        input, select, textarea {
            padding: 10px;
            border: 2px solid #B8E6D1;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #1A4D2E;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-salvar {
            background: #1A4D2E;
            color: white;
        }

        .btn-limpar {
            background: #B8E6D1;
            color: #1A4D2E;
        }

        .btn-lista {
            background: white;
            border: 2px solid #1A4D2E;
            color: #1A4D2E;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-fechar {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        #loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 2000;
        }

        @media (max-width: 1280px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .header-title h1 {
                font-size: 22px;
            }
        }

        @media (max-width: 600px) {
            .header {
                justify-content: center;
                text-align: center;
            }
            
            .header-logo {
                width: 100%;
                justify-content: center;
            }
            
            .form-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-logo">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="header-title">
            <h1>Instituto Educacional Marito Dutra</h1>
            <p id="nome-professor">Carregando...</p>
        </div>
        <div class="header-user">
            <button class="btn-sair" id="btn-sair">Sair</button>
        </div>
    </div>

    <!-- SUB HEADER -->
    <div class="sub-header">
        <button class="btn-voltar" onclick="history.back()">← Voltar</button>
        <h2>AGENDAMENTO DE PROVAS</h2>
        <div></div>
    </div>

    <!-- FORM -->
    <div class="container">
        <div class="form-card">
            <form id="formProva">
                <div class="form-grid">
                    <div class="form-group">
                        <label>DISCIPLINA *</label>
                        <select name="disciplina" id="disciplina-select" required>
                            <option value="">Carregando...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>TURNO *</label>
                        <select name="turno" required>
                            <option value="">Selecione</option>
                            <option>Manhã</option>
                            <option>Tarde</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>SÉRIE *</label>
                        <select name="serie" required>
                            <option value="">Selecione</option>
                            <option>1ª Série</option>
                            <option>2ª Série</option>
                            <option>3ª Série</option>
                            <option>4ª Série</option>
                            <option>5ª Série</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>DATA DA PROVA *</label>
                        <input type="date" name="data_prova" required>
                    </div>

                    <div class="form-group full">
                        <label>ASSUNTO *</label>
                        <textarea name="assunto" placeholder="Ex: Prova de Geografia - Cap 1 a 3, páginas 13, 16 e 18" required></textarea>
                    </div>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-salvar">Salvar</button>
                    <button type="reset" class="btn btn-limpar">Limpar</button>
                    <button type="button" class="btn btn-lista" id="btn-lista">Visualizar Lista</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modalLista">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Provas Agendadas</h3>
                <button class="btn-fechar" onclick="fecharModal()">X</button>
            </div>
            <div id="listaProvas">
                <p>Carregando...</p>
            </div>
        </div>
    </div>

    <div id="loading">Carregando...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDJnKktnaupmHUwL-jZHIeionowOb6Egrg",
    authDomain: "agenda-escolar-19fda.firebaseapp.com",
    projectId: "agenda-escolar-19fda",
    storageBucket: "agenda-escolar-19fda.firebasestorage.app",
    messagingSenderId: "460998217684",
    appId: "1:460998217684:web:98e4a2cc23b467124bd041",
    measurementId: "G-RL4NVD2Y1C"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    document.getElementById('loading').style.display = 'block';
    if (user) {
      const docRef = doc(db, "professores", user.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById('nome-professor').textContent = `Prof. ${data.nome}`;
        
        const select = document.getElementById('disciplina-select');
        select.innerHTML = '<option value="">Selecione</option>';
        data.disciplinas.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          select.appendChild(opt);
        });
        document.getElementById('loading').style.display = 'none';
      } else {
        document.getElementById('loading').style.display = 'none';
        window.location.href = 'index.html';
      }
    } else {
      document.getElementById('loading').style.display = 'none';
      window.location.href = 'index.html';
    }
  });

  document.getElementById('btn-sair').addEventListener('click', () => {
    signOut(auth).then(() => {
      window.location.href = 'index.html';
    });
  });

  document.getElementById('formProva').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('loading').style.display = 'block';
    
    const formData = new FormData(e.target);
    const prova = {
      disciplina: formData.get('disciplina'),
      turno: formData.get('turno'),
      serie: formData.get('serie'),
      data_prova: formData.get('data_prova'),
      assunto: formData.get('assunto'),
      professor: auth.currentUser.uid,
      nome_professor: document.getElementById('nome-professor').textContent,
      criadoEm: new Date()
    };

    try {
      await addDoc(collection(db, 'provas'), prova);
      alert('✅ Prova agendada com sucesso!');
      e.target.reset();
    } catch (error) {
      console.error('Erro:', error);
      alert('❌ Erro ao salvar prova');
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  });

  document.getElementById('btn-lista').addEventListener('click', async () => {
    document.getElementById('modalLista').classList.add('active');
    const listaDiv = document.getElementById('listaProvas');
    listaDiv.innerHTML = '<p>Carregando...</p>';
    
    const q = query(
      collection(db, 'provas'), 
      where('professor', '==', auth.currentUser.uid), 
      limit(20)
    );
    
    const querySnapshot = await getDocs(q);
    let html = '';
    
    if (querySnapshot.empty) {
      html = '<p>Nenhuma prova agendada ainda.</p>';
    } else {
      const provas = [];
      querySnapshot.forEach((doc) => {
        provas.push(doc.data());
      });
      provas.sort((a, b) => b.criadoEm - a.criadoEm);
      
      provas.forEach((p) => {
        const dataFormatada = p.data_prova.split('-').reverse().join('/');
        html += `<div style="padding:10px; border-bottom:1px solid #B8E6D1; margin-bottom:10px;">
          <strong>${dataFormatada}</strong> - ${p.disciplina} - ${p.serie} - ${p.turno}<br>
          <small>${p.assunto}</small>
        </div>`;
      });
    }
    listaDiv.innerHTML = html;
  });

  window.fecharModal = () => {
    document.getElementById('modalLista').classList.remove('active');
  }
</script>
</body>
</html>
