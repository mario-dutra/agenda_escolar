<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: aquamarine; margin: 0; padding: 0; }
    .menu { background: #1b6017; color: white; padding: 15px; text-align: center; }
    .menu a { color: white; margin: 0 15px; text-decoration: none; font-size: 18px; }
    .conteudo { padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="menu">
    <a href="cadastro_aluno.html">Cadastro Aluno</a>
    <a href="cadastro_professor.html">Cadastro Professor</a>
  <button id="logout-button">Sair</button>
  </div>
  <div class="conteudo">
    <h2>Bem-vindo, Admin!</h2>
    <p>Escolha uma opção no menu acima.</p>
  </div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJnKktnaupmHUwL-jZHIeionowOb6Egrg",
  authDomain: "agenda-escolar-19fda.firebaseapp.com",
  projectId: "agenda-escolar-19fda",
  storageBucket: "agenda-escolar-19fda.firebasestorage.app",
  messagingSenderId: "460998217684",
  appId: "1:460998217684:web:98e4a2cc23b467124bd041",
  measurementId: "G-RL4NVD2Y1C"
};

initializeApp(firebaseConfig);
const auth = getAuth();

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = 'admin.html';
  }
});

document.getElementById('logout-button').addEventListener('click', () => {
  console.log('Botão clicado!');
  signOut(auth).then(() => {
    window.location.href = 'admin.html';
  }).catch((error) => {
    console.error('Erro ao sair:', error);
  });
});
  </script>
</body>
</html>
