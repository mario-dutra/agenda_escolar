<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Aluno</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: aquamarine;
      padding: 20px;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      margin: auto;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    #sair {
      background-color: #f44336;
    }
    .botoes {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>
  <form id="form-cadastro-aluno">
    <h2>Cadastro Aluno</h2>
    <label>Nome:</label>
    <input type="text" name="nome">
    <label>Foto:</label>
    <input type="file" id="foto-aluno">
    <label>Série:</label>
    <select name="serie">
      <option value="Jardim I">Jardim I</option>
      <option value="Jardim II">Jardim II</option>
      <option value="Jardim III">Jardim III</option>
      <option value="Jardim IV">Jardim IV</option>
      <option value="Jardim V">Jardim V</option>
      <option value="1º Ano">1º Ano</option>
      <option value="2º Ano">2º Ano</option>
      <option value="3º Ano">3º Ano</option>
      <option value="4º Ano">4º Ano</option>
      <option value="5º Ano">5º Ano</option>
      <option value="6º Ano">6º Ano</option>
      <option value="7º Ano">7º Ano</option>
      <option value="8º Ano">8º Ano</option>
    </select>
    <label>Turno:</label>
    <select name="periodo">
      <option value="Manhã">Manhã</option>
      <option value="Tarde">Tarde</option>
    </select>
    <label>Usuário:</label>
    <input type="text" name="usuario">
    <label>Senha:</label>
    <input type="password" name="senha">
    <div class="botoes">
      <button type="submit">Salvar</button>
      <button type="reset">Limpar</button>
      <button type="button" onclick="history.back()">Voltar</button>
      <button id="sair" type="button">Sair</button>
    </div>
  </form>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getFirestore, collection, addDoc } from 'firebase/firestore';
    import $ from 'https://cdn.skypack.dev/jquery@3.6.0';

    const firebaseConfig = {
      apiKey: "AIzaSyDJnKktnaupmHUwL-jZHIeionowOb6Egrg",
      authDomain: "agenda-escolar-19fda.firebaseapp.com",
      projectId: "agenda-escolar-19fda",
      storageBucket: "agenda-escolar-19fda.firebasestorage.app",
      messagingSenderId: "460998217684",
      appId: "1:460998217684:web:98e4a2cc23b467124bd041",
      measurementId: "G-RL4NVD2Y1C"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'admin.html';
      }
    });

    const form = document.getElementById('form-cadastro-aluno');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = form.nome.value;
      const foto = form['foto-aluno'].files[0];
      const serie = form.serie.value;
      const turno = form.periodo.value;
      const usuario = form.usuario.value;
      const senha = form.senha.value;

      // Autorizar o acesso ao Google Fotos
      const apiKey = 'AIzaSyDJnKktnaupmHUwL-jZHIeionowOb6Egrg';
      const clientId = '460998217684-343pt8eb6kteor193t80cckoa6nun2i9.apps.googleusercontent.com';
      const clientSecret = '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';
      const redirectUri = ' https://mario-dutra.github.io/aluno.html';

      // Função para obter o token de acesso
      async function getAccessToken() {
        const url = `https://accounts.google.com/o/oauth2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=https://www.googleapis.com/auth/photoslibrary&access_type=offline&key=${apiKey}`;
        window.location.href = url;
      }

      // Função para fazer o upload da foto
      async function uploadFoto(foto, accessToken) {
        const uploadResponse = await fetch('https://photoslibrary.googleapis.com/v1/uploads', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Content-Type': 'application/octet-stream'
          },
          body: foto
        });
        const uploadToken = await uploadResponse.text();
        // Creat um novo item de mídia no Google Fotos
        const mediaItemResponse = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:batchCreate', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            'newMediaItems': [
              {
                'description': 'Foto do aluno',
                'simpleMediaItem': {
                  'fileName': foto.name,
                  'uploadToken': uploadToken
                }
              }
            ]
          })
        });
        const mediaItemData = await mediaItemResponse.json();
        const mediaItemId = mediaItemData.newMediaItemResults[0].mediaItem.id;
        return mediaItemId;
      }

    
   // Obter o código de autorização
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get('code');

if (code) {
  // Obter o token de acesso
  const tokenResponse = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body: `code=${code}&client_id=${clientId}&client_secret=${clientSecret}&redirect_uri=${redirectUri}&grant_type=authorization_code`
  });
  const tokenData = await tokenResponse.json();
  const accessToken = tokenData.access_token;

  // Fazer o upload da foto
  const mediaItemId = await uploadFoto(foto, accessToken);

  // Salvar os dados do aluno no Firestore
  createUserWithEmailAndPassword(auth, usuario, senha)
    .then((userCredential) => {
      const user = userCredential.user;
      addDoc(collection(db, 'alunos'), {
        nome,
        foto_id: mediaItemId,
        serie,
        turno,
        usuario,
      }).then(() => {
        alert('Aluno cadastrado com sucesso!');
        $('form')[0].reset();
      });
    })
    .catch((error) => {
      if (error.code === 'auth/email-already-in-use') {
        alert('Usuário já existe!');
      } else {
        alert('Erro ao cadastrar aluno: ' + error.message);
      }
    });
} else {
  // Redirecionar para a página de autorização
  getAccessToken();
}
});

$('#sair').click(function() {
  signOut(auth).then(() => {
    window.location.href = 'admin.html';
  }).catch((error) => {
    console.error('Erro ao sair:', error);
  });
});
</script>
</body>
</html>
