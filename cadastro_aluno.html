<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Aluno</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: aquamarine;
      padding: 20px;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      margin: auto;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    .botoes {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>
  <form>
    <h2>Cadastro Aluno</h2>
    <label>Nome:</label>
    <input type="text" name="nome">
    <label>Foto:</label>
    <input type="file">
    <label>Série:</label>
    <select name="serie">
       <option value="3º Ano">Jardim I</option>
       <option value="3º Ano">Jardim II</option>
       <option value="3º Ano">Jardim III</option>
       <option value="3º Ano">Jardim IV</option>
       <option value="3º Ano">Jardim V</option>
      <option value="1º Ano">1º Ano</option>
      <option value="2º Ano">2º Ano</option>
      <option value="3º Ano">3ª Ano</option>
      <option value="4º Ano">4º Ano</option>
      <option value="5º Ano">5º Ano</option>
      <option value="6º Ano">6º Ano</option>
      <option value="7º Ano">7º Ano</option>
      <option value="8º Ano" >8º Ano</option>
    </select>
    <label>Período:</label>
    <select name="periodo">
      <option value="Manhã">Manhã</option>
      <option value="Tarde">Tarde</option>
    </select>
    <label>Turma:</label>
    <select name="turma">
      <option value="A">A</option>
      <option value="B">B</option>
      <option value="C">C</option>
    </select>
    <label>Usuário:</label>
    <input type="text" name="usuario">
    <label>Senha:</label>
    <input type="password" name="senha">
    <div class="botoes">
      <button type="submit">Salvar</button>
      <button type="reset">Limpar</button>
      <button type="button" onclick="history.back()">Voltar</button>
    </div>
  </form>
</body>
</html>
