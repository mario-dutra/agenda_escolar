<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Aluno</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: aquamarine;
      padding: 20px;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      margin: auto;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      padding: 10px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #sair { background-color: #f44336; }
   .botoes { display: flex; gap: 10px; flex-wrap: wrap; }
    #msg { margin-top: 10px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>
  <form id="form-aluno">
    <h2>Cadastro Aluno</h2>
    <label>Nome:</label>
    <input type="text" id="nome" required>

    <label>Foto:</label>
    <input type="file" id="foto-aluno">

    <label>Série:</label>
    <select id="serie" required>
      <option value="">Selecione</option>
      <option value="Jardim I">Jardim I</option>
      <option value="Jardim II">Jardim II</option>
      <option value="Jardim III">Jardim III</option>
      <option value="Jardim VI">Jardim VI</option>
      <option value="Jardim V">Jardim V</option>
      <option value="1° ANO">1° ANO</option>
      <option value="2° ANO">2° ANO</option>
      <option value="3° ANO">3° ANO</option>
      <option value="4° ANO">4° ANO</option>
      <option value="5° ANO">5° ANO</option>
      <option value="6° ANO">6° ANO</option>
      <option value="7° ANO">7° ANO</option>
      <option value="8° ANO">8° ANO</option>
      <option value="9° ANO">9° ANO</option>
    </select>

    <label>Turno:</label>
    <select id="turno" required>
      <option value="">Selecione</option>
      <option value="manha">Manhã</option>
      <option value="tarde">Tarde</option>
    </select>

    <label>Email do aluno:</label>
    <input type="email" id="email" placeholder="aluno@email.com" required>

    <label>Senha:</label>
   <input type="password" id="senha" placeholder="Digite a senha do aluno" required>
    <div class="botoes">
      <button type="submit" id="btn-salvar">Salvar</button>
      <button type="reset">Limpar</button>
      <button type="button" onclick="history.back()">Voltar</button>
      <button id="sair" type="button">Sair</button>
    </div>
    <div id="msg"></div>
  </form>

  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
  
 <script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDJnKktnaupmHUwL-jZHIeionowOb6Egrg",
    authDomain: "agenda-escolar-19fda.firebaseapp.com",
    projectId: "agenda-escolar-19fda",
    storageBucket: "agenda-escolar-19fda.firebasestorage.app",
    messagingSenderId: "460998217684",
    appId: "1:460998217684:web:98e4a2cc23b467124bd041"
  };

  // App principal = admin logado
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // App secundário = só pra criar aluno, não mexe no login do admin
  const secondaryApp = initializeApp(firebaseConfig, "Secondary");
  const secondaryAuth = getAuth(secondaryApp);

  const cloudName = 'dxca9xqzs';
  const uploadPreset = 'avatar';

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'admin.html';
    }
  });

  document.getElementById('form-aluno').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-salvar');
    const msg = document.getElementById('msg');

    const nome = document.getElementById('nome').value;
    const fotoInput = document.getElementById('foto-aluno');
    const serie = document.getElementById('serie').value;
    const turno = document.getElementById('turno').value;
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;

    btn.disabled = true;
    btn.textContent = 'Salvando...';
    msg.textContent = '';

    const criarAluno = async (imageUrl = './img/aluna.png') => {
      try {
        // 1. Cria o usuário usando o APP SECUNDÁRIO - não desloga o admin
        const userCredential = await createUserWithEmailAndPassword(secondaryAuth, email, senha);
        const uid = userCredential.user.uid;

        // 2. Cria no Firestore usando o APP PRINCIPAL - admin ainda tá logado
        await setDoc(doc(db, 'alunos', uid), {
          nome: nome,
          foto: imageUrl,
          serie: serie,
          turno: turno,
          email: email,
          tipo_usuario: 'aluno',
          usuario: email.split('@')[0]
        });

        // 3. Desloga só o app secundário
        await signOut(secondaryAuth);

        msg.style.color = 'green';
        msg.textContent = 'Aluno cadastrado com sucesso!';
        document.getElementById('form-aluno').reset();

      } catch (error) {
        console.error(error);
        if (error.code === 'auth/email-already-in-use') {
          msg.style.color = 'red';
          msg.textContent = 'Esse email já está cadastrado!';
        } else {
          msg.style.color = 'red';
          msg.textContent = 'Erro: ' + error.message;
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar';
      }
    };

    if (fotoInput.files.length > 0) {
      const uploadWidget = cloudinary.openUploadWidget({
        cloudName,
        uploadPreset,
        sources: ['local'],
        multiple: false,
        cropping: true,
        resourceType: 'image',
      }, (error, result) => {
        if (!error && result.event === 'success') {
          criarAluno(result.info.secure_url);
        }
        if (error) {
          msg.style.color = 'red';
          msg.textContent = 'Erro no upload da foto';
          btn.disabled = false;
          btn.textContent = 'Salvar';
        }
      });
      uploadWidget.open();
    } else {
      criarAluno();
    }
  });

  document.getElementById('sair').addEventListener('click', () => {
    signOut(auth).then(() => {
      window.location.href = 'admin.html';
    });
  });
</script>

</body>
</html>
