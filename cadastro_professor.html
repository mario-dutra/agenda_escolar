<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Professor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: aquamarine;
      padding: 20px;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      margin: auto;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    .botoes {
      display: flex;
      gap: 10px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>
<body>
  <form>
    <h2>Cadastro Professor</h2>
    <label>Nome:</label>
    <input type="text" name="nome">
    <label>Disciplinas:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" name="disciplina[]" value="Matemática"> Matemática</label>
      <label><input type="checkbox" name="disciplina[]" value="Português"> Português</label>
      <label><input type="checkbox" name="disciplina[]" value="História"> História</label>
      <label><input type="checkbox" name="disciplina[]" value="Geografia"> Geografia</label>
      <label><input type="checkbox" name="disciplina[]" value="Física"> Física</label>
      <label><input type="checkbox" name="disciplina[]" value="Química"> Química</label>
       <label><input type="checkbox" name="disciplina[]" value="Ingles"> Inglês</label>
        <label><input type="checkbox" name="disciplina[]" value="Redacao"> Redação</label>
         <label><input type="checkbox" name="disciplina[]" value="Artes"> Artes</label>
    </div>
    <label>Email:</label>
    <input type="email" name="email">
    <label>Usuário:</label>
    <input type="text" name="usuario">
    <label>Senha:</label>
    <input type="password" name="senha">
    <div class="botoes">
      <button type="submit">Salvar</button>
      <button type="reset">Limpar</button>
      <button type="button" onclick="history.back()">Voltar</button>
    </div>
  </form>
</body>
</html>
