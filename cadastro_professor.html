<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Professor</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: aquamarine; padding: 20px; }
    form { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
    input, select { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 15px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
    .botoes { display: flex; gap: 10px; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    .checkbox-group label { display: flex; align-items: center; gap: 5px; }
    .menu { background: #1b6017; color: white; padding: 15px; text-align: center; margin-bottom: 20px; }
    .menu a, .menu button { color: white; margin: 0 15px; text-decoration: none; font-size: 18px; background: none; border: none; cursor: pointer; }
    .alert {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
      z-index: 1000;
    }
    .alert button {
      margin-top: 10px;
      padding: 5px 10px;
    }
  </style>
</head>
<body>
  <form>
    <h2>Cadastro Professor</h2>
    <label>Nome:</label>
    <input type="text" name="nome" required>
    <label>Disciplinas:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" name="disciplina[]" value="Matemática"> Matemática</label>
      <label><input type="checkbox" name="disciplina[]" value="Português"> Português</label>
      <label><input type="checkbox" name="disciplina[]" value="História"> História</label>
      <label><input type="checkbox" name="disciplina[]" value="Geografia"> Geografia</label>
      <label><input type="checkbox" name="disciplina[]" value="Física"> Física</label>
      <label><input type="checkbox" name="disciplina[]" value="Química"> Química</label>
      <label><input type="checkbox" name="disciplina[]" value="Ingles"> Inglês</label>
      <label><input type="checkbox" name="disciplina[]" value="Redacao"> Redação</label>
      <label><input type="checkbox" name="disciplina[]" value="Artes"> Artes</label>
    </div>
    <label>Email:</label>
    <input type="email" name="email" required>
    <label>Senha:</label>
    <input type="password" name="senha" required placeholder="minimo de 6 caracteres">
    <div class="botoes">
      <button type="submit">Salvar</button>
      <button type="reset">Limpar</button>
      <button type="button" onclick="history.back()">Voltar</button>
      <button id="logout-button">Sair</button>
    </div>
  </form>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDJnKktnaupmHUwL-jZHIeionowOb6Egrg",
      authDomain: "agenda-escolar-19fda.firebaseapp.com",
      projectId: "agenda-escolar-19fda",
      storageBucket: "agenda-escolar-19fda.firebasestorage.app",
      messagingSenderId: "460998217684",
      appId: "1:460998217684:web:98e4a2cc23b467124bd041",
      measurementId: "G-RL4NVD2Y1C"
    };
    initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'admin.html';
      }
    });

    document.getElementById('logout-button').addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = 'admin.html';
      }).catch((error) => {
        console.error('Erro ao sair:', error);
      });
    });

    function showAlert(msg) {
      const div = document.createElement('div');
      div.className = 'alert';
      div.innerHTML = `
        <p>${msg}</p>
        <button onclick="this.parentNode.remove()">OK</button>
      `;
      document.body.appendChild(div);
    }

    document.querySelector('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = document.querySelector('input[name="nome"]').value;
      const disciplinas = Array.from(document.querySelectorAll('input[name="disciplina[]"]:checked')).map(el => el.value);
      const email = document.querySelector('input[name="email"]').value;
      const senha = document.querySelector('input[name="senha"]').value;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
        const userId = userCredential.user.uid;
        await setDoc(doc(db, "professores", userId), { nome, disciplinas, email });
        showAlert('✅ Professor cadastrado com sucesso!');
        document.querySelector('form').reset();
      } catch (error) {
        console.error('Erro:', error);
        if (error.code === 'auth/weak-password') {
          showAlert('❌ Senha deve ter no mínimo 6 caracteres');
        } else {
          showAlert('❌ Erro ao cadastrar');
        }
      }
    });
  </script>
</body>
</html>
