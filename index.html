<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Escolar</title>
  <link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">  

                                                                                
  <style>
    body {
      background-color: rgb(3, 54, 24);
    }
    .alert {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  text-align: center;
  z-index: 1000;
}
.alert button {
  margin-top: 10px;
  padding: 5px 10px;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.alert button:hover {
  cursor: pointer;
}
#forgot-password-aluno, #forgot-password-professor {
  margin-top: 10px;
  font-size: 14px;
}
#forgot-password-aluno a, #forgot-password-professor a {
  color: #4CAF50;
  text-decoration: none;
}
#forgot-password-aluno a:hover, #forgot-password-professor a:hover {
  text-decoration: underline;
}




  </style>
</head>
<body>
  <div class="geral">
    <div class="logo"><img src="./img/logo.png" alt="" class="logo-img"></div>
    <div class="titulo">
      <h1>Instituto Educacional Marito Dutra</h1>
      <p><b>AGENDA ESCOLAR 2026</b></p>
    </div>
    <div class="area-aluno" onclick="abrirModal('aluno')"><img src="./img/aluna.png" alt="area do aluno" class="logo-aluno-professor"></div><hr/>
    <div class="area-professor" onclick="abrirModal('professor')"><img src="./img/professor.png" alt="area do professor" class="logo-aluno-professor"></div>
  </div>
  <!-- Modais -->
 <div id="modal-aluno" class="modal">
  <form id="aluno-login-form">
    <h2>Login Aluno</h2>
    <input type="text" id="aluno-matricula" placeholder="Email">
    <input type="password" id="aluno-senha" placeholder="Senha">
    <button type="submit">Entrar</button>
    <button type="button" onclick="fecharModal('aluno')">Fechar</button>
    <p id="forgot-password-aluno"><a href="#">Esqueceu a senha?</a></p>                           
  </form>
</div>

<div id="modal-professor" class="modal">
  <form id="professor-login-form">
    <h2>Login Professor</h2>
    <input type="email" name="email" placeholder="Email">
    <input type="password" name="senha" placeholder="Senha">
    <button type="submit">Entrar</button>
    <button type="button" onclick="fecharModal('professor')">Fechar</button>
    <p id="forgot-password-professor"><a href="#">Esqueceu a senha?</a></p>
  </form>
</div>

  <script src="js/script.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
   // import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";                                                                                         
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
   
    const firebaseConfig = {
      apiKey: "AIzaSyDJnKktnaupmHUwL-jZHIeionowOb6Egrg",
      authDomain: "agenda-escolar-19fda.firebaseapp.com",
      projectId: "agenda-escolar-19fda",
      storageBucket: "agenda-escolar-19fda.firebasestorage.app",
      messagingSenderId: "460998217684",
      appId: "1:460998217684:web:98e4a2cc23b467124bd041",
      measurementId: "G-RL4NVD2Y1C"
    };
    initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    document.getElementById('aluno-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const matricula = document.getElementById('aluno-matricula').value;
      const senha = document.getElementById('aluno-senha').value;
      try {
        const userCredential = await signInWithEmailAndPassword(auth, matricula, senha);
        const user = userCredential.user;
        const alunoRef = collection(db, 'alunos');
        const q = query(alunoRef, where('usuario', '==', matricula));
        const querySnapshot = await getDocs(q);
        if (querySnapshot.empty) {
          showAlert('❌ Usuário não encontrado');
          return;
        }
        const alunoDoc = querySnapshot.docs[0];
        const tipo = alunoDoc.data().tipo_usuario;
        if (tipo !== 'aluno') {
          showAlert('❌ Você não tem permissão para acessar essa área');
          return;
        }
        localStorage.setItem('uid', user.uid);
        window.location.href = 'aluno.html';
      } catch (error) {
        console.error('Erro:', error);
        showAlert('❌ Matrícula ou senha inválidos');
      }
    });
    document.getElementById('professor-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.querySelector('input[name="email"]').value;
      const senha = document.querySelector('input[name="senha"]').value;
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, senha);
        const user = userCredential.user;
        const professorRef = collection(db, 'professores');
        const q = query(professorRef, where('email', '==', email));
        const querySnapshot = await getDocs(q);
        if (querySnapshot.empty) {
          showAlert('❌ Usuário não encontrado');
          return;
        }
        const professorDoc = querySnapshot.docs[0];
        const tipo = professorDoc.data().tipo_usuario;
        if (tipo !== 'professor') {
          showAlert('❌ Você não tem permissão para acessar essa área');
          return;
        }
        window.location.href = 'professor.html';
      } catch (error) {
        console.error('Erro:', error);
        showAlert('❌ Email ou senha inválidos');
      }
    });

    
   document.getElementById('forgot-password-aluno').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = prompt('Digite seu email:');
  if (email) {
    try {
      await sendPasswordResetEmail(auth, email);
      showAlert('Email de recuperação enviado!');
    } catch (error) {
      console.log(error);
      showAlert('Erro ao enviar email de recuperação');
    }
  }
});

document.getElementById('forgot-password-professor').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = prompt('Digite seu email:');
  if (email) {
    try {
      await sendPasswordResetEmail(auth, email);
      showAlert('Email de recuperação enviado!');
    } catch (error) {
      console.log(error);
      showAlert('Erro ao enviar email de recuperação');
    }
  }
});
    function showAlert(msg) {
      const div = document.createElement('div');
      div.className = 'alert';
      div.innerHTML = `
        <p>${msg}</p>
        <button onclick="this.parentNode.remove()">OK</button>
      `;
      document.body.appendChild(div);
    }
  </script>

  <div id="reset-password-modal" class="modal" style="display: none;">
  <div class="modal-content">
    <h2>Recuperar Senha</h2>
    <p>Digite seu email cadastrado:</p>
    <input type="email" id="reset-email" placeholder="Seu email">
    <div class="modal-buttons">
      <button id="send-reset-email">Enviar</button>
      <button id="cancel-reset">Cancelar</button>
    </div>
  </div>
</div>

</body>
</html>
