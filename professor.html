<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professor</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      background-color: aquamarine;
    }
    #historico-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 500px;
  max-height: 80vh;
  overflow-y: auto;
}

@media (max-width: 768px) {
  #historico-modal {
    width: 90%;
    max-width: none;
    max-height: 90vh;
  }
}

@media (max-width: 480px) {
  #historico-modal {
    width: 95%;
    max-width: none;
    max-height: 95vh;
    padding: 10px;
  }
}
  </style>
</head>
<body>
  <!-- Section 1: Header -->
  <header>
    <div class="logo">
      <img src="./img/logo.png" alt="" class="logo-img">
    </div>
    <div class="info-professor">
      <span id="nome-professor" class="nome"></span>
      <span id="disciplinas-professor" class="disciplinas"></span>
    </div>
    <button id="logout-button">Sair</button>
  </header>
  <!-- Section 2: Agendamento Tarefas -->
  <section class="agendamento">
    <h2>Agendamento Tarefas</h2>
    <form>
      <div class="container">
        <div class="col">
          <div>
            <label>Data:</label>
            <input type="date" id="data-agendamento" class="form-control" style="width: 50%;" required>
          </div>
          <div>
            <label>Disciplina:</label>
            <select id="disciplina-select" name="disciplina" required>
              <!-- disciplinas serão preenchidas pelo JS -->
            </select>
          </div>
          <div>
            <label>Turno:</label>
            <select name="turno">
              <option value="manha">Manhã</option>
              <option value="tarde">Tarde</option>
            </select>
          </div>
          <div>
            <label>Livro:</label>
            <input type="text" name="livro">
          </div>
        </div>
        <div class="col">
          <div>
            <label>Série:</label>
            <select name="serie">
              <option value="1ª serie">1ª série</option>
              <option value="2ª serie">2ª série</option>
              <option value="3ª serie">3ª série</option>
              <option value="4ª serie">4ª série</option>
              <option value="5ª serie">5ª série</option>
              <option value="6ª serie">6ª série</option>
              <option value="7ª serie">7ª série</option>
              <option value="8ª serie">8ª série</option>
              <option value="9ª ano">9ª ano</option>
              <option value="1ª ano">1ª ano</option>
              <option value="2ª ano">2ª ano</option>
            </select>
          </div>
          <!-- <div>
            <label>Turma:</label>
            <select name="turma">
              <option value="turma A">turma A</option>
              <option value="turma B">turma B</option>
              <option value="turma C">turma C</option>
            </select>
          </div> -->
          <div>
            <label>Observação:</label>
            <textarea name="observacao"></textarea>
          </div>
          <div class="inline-row" style="position: relative;">
            <button id="btn-tarefa-impressa" type="button">Tarefa Impressa</button>
            <div id="opcoes-impressa" style="display: none; position: absolute; top:0px;width: 100px; left: 125px; padding:0px; border: 0px solid #ddd;height: 30px;">
              <input type="checkbox" id="impressa" name="impressa" value="sim">
              &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Sim
            </div>
          </div>
        </div>
      </div>
      <div class="botoes">
        <button type="submit">Salvar</button>
        <button type="reset">Limpar</button>
        <button id="btn-historico" type="button">Histórico</button>
      </div>
    </form>
  </section>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, addDoc, query, where, onSnapshot, deleteDoc, updateDoc, orderBy, limit, getDocs} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDJnKktnaupmHUwL-jZHIeionowOb6Egrg",
    authDomain: "agenda-escolar-19fda.firebaseapp.com",
    projectId: "agenda-escolar-19fda",
    storageBucket: "agenda-escolar-19fda.firebasestorage.app",
    messagingSenderId: "460998217684",
    appId: "1:460998217684:web:98e4a2cc23b467124bd041",
    measurementId: "G-RL4NVD2Y1C"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    document.getElementById('loading').style.display = 'block';
    if (user) {
      const docRef = doc(db, "professores", user.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById('nome-professor').textContent = data.nome;
        document.getElementById('disciplinas-professor').textContent = data.disciplinas.join(', ');
        const select = document.getElementById('disciplina-select');
        data.disciplinas.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          select.appendChild(opt);
        });
        document.getElementById('loading').style.display = 'none';
      } else {
        document.getElementById('loading').style.display = 'none';
        window.location.href = 'index.html';
      }
    } else {
      document.getElementById('loading').style.display = 'none';
      window.location.href = 'index.html';
    }
  });

  document.getElementById('logout-button').addEventListener('click', () => {
    document.getElementById('loading').style.display = 'block';
    signOut(auth).then(() => {
      window.location.href = 'index.html';
    }).catch((error) => {
      console.error('Erro ao sair:', error);
      document.getElementById('loading').style.display = 'none';
    });
  });

   const form = document.querySelector('form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('loading').style.display = 'block';
    const data = document.querySelector('input[type="date"]').value;
    const disciplina = document.getElementById('disciplina-select').value;
    const turno = document.querySelector('select[name="turno"]').value;
    const livro = document.querySelector('input[name="livro"]').value;
    const serie = document.querySelector('select[name="serie"]').value;
    //const turma = document.querySelector('select[name="turma"]').value;
    const observacao = document.querySelector('textarea[name="observacao"]').value;
    const impressa = document.querySelector('input[name="impressa"]').checked ? 'Sim' : 'Não';
    const nomeProfessor = document.getElementById('nome-professor').textContent;
    const tarefa = {
      data,
      disciplina,
      turno,
      livro,
      serie,
      //turma,
      observacao,
      impressa,
      professor: auth.currentUser.uid,
      nome_professor: nomeProfessor,
      criadoEm: new Date()
    };
    try {
      const docRef = await addDoc(collection(db, 'tarefas'), tarefa);
      showAlert('✅ Tarefa salva com sucesso!');
      form.reset();
      document.getElementById('loading').style.display = 'none';
    } catch (error) {
      console.error('Erro:', error);
      showAlert('❌ Erro ao salvar tarefa');
      document.getElementById('loading').style.display = 'none';
    }
  });

  async function editarTarefa(id, showExcluir = false) {
    document.getElementById('historico-modal').style.display = 'none';
    try {
      const tarefaRef = doc(db, 'tarefas', id);
      const docSnap = await getDoc(tarefaRef);
      if (docSnap.exists()) {
        const tarefa = docSnap.data();
        document.querySelector('input[type="date"]').value = tarefa.data;
        document.getElementById('disciplina-select').value = tarefa.disciplina;
        document.querySelector('select[name="turno"]').value = tarefa.turno;
        document.querySelector('input[name="livro"]').value = tarefa.livro;
        document.querySelector('select[name="serie"]').value = tarefa.serie;
        //document.querySelector('select[name="turma"]').value = tarefa.turma;
        document.querySelector('textarea[name="observacao"]').value = tarefa.observacao;
        document.querySelector('input[name="impressa"]').checked = tarefa.impressa === 'Sim';
        form.onsubmit = async (e) => {
          e.preventDefault();
          const updatedTarefa = {
            data: document.querySelector('input[type="date"]').value,
            disciplina: document.getElementById('disciplina-select').value,
            turno: document.querySelector('select[name="turno"]').value,
            livro: document.querySelector('input[name="livro"]').value,
            serie: document.querySelector('select[name="serie"]').value,
            // turma: document.querySelector('select[name="turma"]').value,
            observacao: document.querySelector('textarea[name="observacao"]').value,
            impressa: document.querySelector('input[name="impressa"]').checked ? 'Sim' : 'Não',
          };
          try {
            await updateDoc(tarefaRef, updatedTarefa);
            showAlert('✅ Tarefa atualizada com sucesso!');
            form.reset();
            form.onsubmit = async (e) => {
              e.preventDefault();
              // código original de submissão do formulário
            };
            document.getElementById('loading').style.display = 'none';
          } catch (error) {
            console.error('Erro:', error);
            showAlert('❌ Erro ao atualizar tarefa');
            document.getElementById('loading').style.display = 'none';
          }
        };
        document.getElementById('loading').style.display = 'none';
      } else {
        showAlert('❌ Tarefa não encontrada');
        document.getElementById('loading').style.display = 'none';
      }
    } catch (error) {
      console.error('Erro:', error);
      showAlert('❌ Erro ao carregar tarefa');
      document.getElementById('loading').style.display = 'none';
    }
  }

  function showConfirmModal(id) {
    const modal = document.createElement('div');
    modal.className = 'alert';
    modal.innerHTML = `
      <p>Tem certeza que deseja excluir esta tarefa?</p>
      <button id="confirmYes">Sim</button>
      <button id="confirmNo">Não</button>
    `;
    document.body.appendChild(modal);
    document.getElementById('confirmYes').addEventListener('click', () => {
      excluirTarefaConfirm(id);
      modal.remove();
    });
    document.getElementById('confirmNo').addEventListener('click', () => {
      modal.remove();
    });
  }

  async function excluirTarefaConfirm(id) {
    document.getElementById('loading').style.display = 'block';
    try {
      const tarefaRef = doc(db, 'tarefas', id);
      await deleteDoc(tarefaRef);
      showAlert('✅ Tarefa excluída com sucesso!');
      document.getElementById('loading').style.display = 'none';
    } catch (error) {
      console.error('Erro ao excluir:', error);
      showAlert('❌ Erro ao excluir tarefa');
      document.getElementById('loading').style.display = 'none';
    }
  }

  async function excluirTarefa(id) {
    showConfirmModal(id);
  }

  function showAlert(msg) {
    const div = document.createElement('div');
    div.className = 'alert';
    div.innerHTML = `
      <p>${msg}</p>
      <button onclick="this.parentNode.remove()">OK</button>
    `;
    document.body.appendChild(div);
  }

  window.editarTarefa = editarTarefa;
  window.excluirTarefa = excluirTarefa;
  $(document).ready(function() {
    $('#btn-tarefa-impressa').click(function() {
      $('#opcoes-impressa').toggle();
    });
    $(document).click(function(e) {
      if (!$(e.target).closest('#btn-tarefa-impressa, #opcoes-impressa').length) {
        $('#opcoes-impressa').hide();
      }
    });
  });

  document.getElementById('btn-historico').addEventListener('click', async () => {
    document.getElementById('loading').style.display = 'block';
    const professorUid = auth.currentUser.uid;
    const q = query(collection(db, 'tarefas'), where('professor', '==', professorUid), orderBy('criadoEm', 'desc'), limit(20));
    const querySnapshot = await getDocs(q);
    let lista = '';
    if (querySnapshot.empty) {
      lista = '<li>Nenhuma tarefa encontrada.</li>';
    } else {
      querySnapshot.forEach((doc) => {
        const tarefa = doc.data();
        const dataFormatada = tarefa.data.split('-').reverse().join('/');
  const altura = 800;
const largura = 500;
const top = (screen.height - altura) / 2;
const left = (screen.width - largura) / 2;

lista += `<li><a href="#" onclick="window.open('editar-tarefa.html?id=${doc.id}', 'Editar Tarefa', 'width=${largura},height=${altura},left=${left},top=${top},resizable=no,scrollbars=no,toolbar=no,menubar=no,location=no,status=no'); return false;" class="link-modal">Editar - ${dataFormatada} - ${tarefa.disciplina}</a></li>`;
      });
    }
    document.getElementById('historico-lista').innerHTML = lista;
    document.getElementById('historico-modal').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
  });

  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.querySelector('#historico-modal');
    const closeBtn = modal.querySelector('.btn-fechar-modal');
    closeBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });
  });
  </script>
  <div id="historico-modal" style="display: none; border: 1px solid green; border-radius: 10px; padding: 20px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white;">
    <button class="btn-fechar-modal">X</button>
    <h3>Histórico</h3>
    <ul id="historico-lista"></ul>
  </div>
  <div id="loading" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.5); color: white; padding: 20px; border-radius: 10px;">Carregando...</div>
</body>
</html>
